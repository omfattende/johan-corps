services:
  - type: web
    name: johan-corps-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_NAME
        value: JohanCorps
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/storage/database.sqlite
      - key: CORS_ALLOWED_ORIGINS
        value: https://johan-corps-frontend.vercel.app
    disk:
      name: sqlite-data
      mountPath: /var/www/storage
      sizeGB: 1
